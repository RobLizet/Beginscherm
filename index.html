<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

:root {
–safe-top: env(safe-area-inset-top, 0px);
–safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
width: 100%; height: 100%;
overflow: hidden;
font-family: ‘Nunito’, sans-serif;
background: #000;
color: white;
}

.screen {
position: fixed;
inset: 0;
background: #000;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
padding-top: calc(var(–safe-top) + 8px);
padding-bottom: calc(var(–safe-bottom) + 24px);
padding-left: 16px;
padding-right: 16px;
}

/* Stars */
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.star {
position: absolute; border-radius: 50%; background: white;
animation: twinkle var(–d,3s) ease-in-out infinite; opacity: var(–op,0.4);
}
@keyframes twinkle {
0%,100% { opacity: var(–op,0.4); } 50% { opacity: 0.05; }
}

/* All content above stars */
.content { position: relative; z-index: 1; }

/* DATE */
.date-block {
text-align: center;
padding: 10px 0 18px;
animation: fadeDown 0.7s ease both;
}
.date-day {
font-size: 88px; font-weight: 200; line-height: 1; letter-spacing: -5px;
text-shadow: 0 0 40px rgba(255,255,255,0.08);
}
.date-label {
font-size: 13px; font-weight: 400; letter-spacing: 4px;
text-transform: uppercase; opacity: 0.45; margin-top: 2px;
}

@keyframes fadeDown {
from { opacity:0; transform: translateY(-14px); }
to   { opacity:1; transform: translateY(0); }
}

/* CARD base */
.card {
background: rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 20px;
padding: 14px 16px;
margin-bottom: 12px;
animation: fadeDown 0.8s ease both;
opacity: 0;
}

/* WEATHER */
.weather-card { animation-delay: 0.05s; }

.weather-top { display: flex; justify-content: space-between; align-items: flex-start; }
.weather-left { display: flex; align-items: center; gap: 12px; }
.w-icon { font-size: 44px; line-height: 1; }
.w-temp { font-size: 40px; font-weight: 200; line-height: 1; letter-spacing: -2px; }
.w-temp sup { font-size: 18px; opacity: 0.65; }
.weather-right { text-align: right; }
.w-loc { font-size: 15px; font-weight: 700; opacity: 0.9; }
.w-desc { font-size: 12px; opacity: 0.5; margin-top: 3px; }
.w-feels { font-size: 11px; opacity: 0.38; margin-top: 2px; }

.w-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 12px 0; }

.w-stats { display: flex; justify-content: space-around; }
.w-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.w-stat-val { font-size: 14px; font-weight: 700; }
.w-stat-lbl { font-size: 10px; opacity: 0.38; letter-spacing: 0.3px; }

.w-loading { text-align: center; font-size: 12px; opacity: 0.35; padding: 6px 0; }

/* CLAUDE */
.claude-card { border-color: rgba(245,158,11,0.2); animation-delay: 0.12s; }

.claude-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.claude-logo {
width: 26px; height: 26px;
background: linear-gradient(135deg, #d97706, #f59e0b);
border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 14px; flex-shrink: 0;
box-shadow: 0 0 14px rgba(245,158,11,0.25);
}
.claude-title { font-size: 11px; font-weight: 700; opacity: 0.55; letter-spacing: 1.2px; text-transform: uppercase; }
.claude-refresh {
margin-left: auto; background: none; border: none; color: white;
font-size: 16px; opacity: 0.3; cursor: pointer; padding: 4px;
transition: opacity 0.2s, transform 0.4s ease;
}
.claude-refresh:active { opacity: 0.8; }
.claude-refresh.spinning { transform: rotate(360deg); opacity: 0.6; }
.claude-text { font-size: 13px; line-height: 1.65; opacity: 0.72; font-style: italic; min-height: 42px; }
.claude-text.loading { opacity: 0.25; }

/* SECTION LABEL */
.section-label {
font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
text-transform: uppercase; opacity: 0.3; margin-bottom: 12px;
animation: fadeDown 0.9s 0.18s ease both; opacity: 0;
}

/* APPS GRID */
.apps-grid {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 16px 6px;
animation: fadeDown 1s 0.22s ease both;
opacity: 0;
margin-bottom: 16px;
}

.app-icon {
display: flex; flex-direction: column; align-items: center; gap: 6px;
text-decoration: none; cursor: pointer; user-select: none;
}

.icon-body {
width: 100%; aspect-ratio: 1;
border-radius: 18px;
display: flex; align-items: center; justify-content: center;
position: relative;
transition: transform 0.1s ease;
box-shadow: 0 6px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.22);
overflow: hidden;
}

.icon-body::before {
content:’’; position:absolute; inset:0;
background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 55%);
border-radius: 18px; z-index:1;
}

.app-icon:active .icon-body { transform: scale(0.86); }

.icon-emoji { font-size: clamp(24px, 7vw, 32px); position: relative; z-index: 2; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }

.app-name {
color: rgba(255,255,255,0.82); font-size: 10px; font-weight: 600;
text-align: center; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
line-height: 1.25; width: 100%;
}

.badge {
position: absolute; top: -5px; right: -5px;
width: 17px; height: 17px; background: #ef4444;
border-radius: 50%; border: 2px solid #000;
display: flex; align-items: center; justify-content: center;
font-size: 8px; font-weight: 800; color: white; z-index: 4;
}

.ic-agenda  { background: linear-gradient(145deg, #7c3aed, #a855f7, #6d28d9); }
.ic-finance { background: linear-gradient(145deg, #059669, #10b981, #047857); }
.ic-med     { background: linear-gradient(145deg, #dc2626, #f87171, #b91c1c); }
.ic-crypto  { background: linear-gradient(145deg, #d97706, #f59e0b, #b45309); }
.ic-auto    { background: linear-gradient(145deg, #2563eb, #60a5fa, #1d4ed8); }
.ic-nood    { background: linear-gradient(145deg, #ea580c, #fb923c, #c2410c); }
.ic-sigbenz { background: linear-gradient(145deg, #475569, #94a3b8, #334155); }
.ic-vvv     { background: linear-gradient(145deg, #ca8a04, #facc15, #a16207); }

</style>
</head>

<script>
// CLOCK in status bar not needed (iOS shows its own)
// DATE
const days   = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
const months = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
const now = new Date();
document.getElementById('dateDay').textContent = now.getDate();
document.getElementById('dateLabel').textContent = days[now.getDay()] + ' · ' + months[now.getMonth()];

// STARS
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  const sz = Math.random() > 0.85 ? 3 : 2;
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${2+Math.random()*5}s;--op:${0.1+Math.random()*0.55};animation-delay:${Math.random()*6}s;`;
  starsEl.appendChild(s);
}

// WEATHER
const WMO_DESC = {0:'Helder',1:'Overwegend helder',2:'Gedeeltelijk bewolkt',3:'Bewolkt',45:'Mist',48:'IJsmist',51:'Lichte motregen',53:'Motregen',55:'Dichte motregen',61:'Lichte regen',63:'Regen',65:'Zware regen',71:'Lichte sneeuw',73:'Sneeuw',75:'Zware sneeuw',80:'Buien',81:'Buien',82:'Zware buien',95:'Onweer',96:'Onweer met hagel',99:'Zwaar onweer'};
const WMO_ICON = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌦️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};

async function loadWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=51.354&longitude=5.546&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,wind_speed_10m,uv_index,weather_code&wind_speed_unit=kmh&timezone=Europe%2FAmsterdam';
    const d = await (await fetch(url)).json();
    const c = d.current;
    document.getElementById('wIcon').textContent  = WMO_ICON[c.weather_code] || '🌡️';
    document.getElementById('wTemp').innerHTML    = Math.round(c.temperature_2m) + '<sup>°C</sup>';
    document.getElementById('wDesc').textContent  = WMO_DESC[c.weather_code] || '';
    document.getElementById('wFeels').textContent = 'Voelt als ' + Math.round(c.apparent_temperature) + '°C';
    document.getElementById('wWind').textContent  = Math.round(c.wind_speed_10m) + ' km/h';
    document.getElementById('wHum').textContent   = c.relative_humidity_2m + '%';
    document.getElementById('wRain').textContent  = c.precipitation + ' mm';
    document.getElementById('wUV').textContent    = Math.round(c.uv_index);
    document.getElementById('wLoading').style.display  = 'none';
    document.getElementById('wContent').style.display  = 'block';
  } catch(e) {
    document.getElementById('wLoading').textContent = 'Weer niet beschikbaar';
  }
}
loadWeather();

// CLAUDE WIDGET
const TOPICS = [
  'Geef een korte motivatietip voor een magazijnbeheerder die hobby-apps bouwt. Max 2 zinnen. In het Nederlands.',
  'Geef een kort interessant weetje over cryptocurrency of Bitcoin. Max 2 zinnen. In het Nederlands.',
  'Geef een slimme tip voor iemand die PWA-webapps bouwt met GitHub Pages. Max 2 zinnen. In het Nederlands.',
  'Geef een inspirerende spreuk voor een nieuwe dag. Max 2 zinnen. In het Nederlands.',
  'Geef een tip om energie te sparen op een werkdag in het magazijn. Max 2 zinnen. In het Nederlands.',
  'Geef een interessant feit over progressive rock muziek of de band Marillion. Max 2 zinnen. In het Nederlands.',
  'Geef een tip over gezond leven voor iemand die een CPAP machine gebruikt. Max 2 zinnen. In het Nederlands.',
];

let tipIdx = Math.floor(Math.random() * TOPICS.length);

async function loadClaude() {
  const el  = document.getElementById('claudeText');
  const btn = document.getElementById('claudeRefresh');
  el.classList.add('loading');
  el.textContent = 'Even nadenken…';
  btn.classList.add('spinning');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: TOPICS[tipIdx % TOPICS.length] }]
      })
    });
    const data = await res.json();
    el.textContent = data.content?.find(b => b.type === 'text')?.text || '–';
    tipIdx++;
  } catch(e) {
    el.textContent = 'Kon Claude niet bereiken. Probeer later opnieuw.';
  }
  el.classList.remove('loading');
  btn.classList.remove('spinning');
  // reset animation
  btn.style.transition = 'none';
  btn.offsetHeight;
  btn.style.transition = '';
}

loadClaude();
document.getElementById('claudeRefresh').addEventListener('click', loadClaude);
</script>
